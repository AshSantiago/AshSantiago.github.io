<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:        #7a8c6e;
      --sage-light:  #a8b89a;
      --sage-pale:   #dde6d5;
      --sage-mist:   #f0f4ec;
      --bark:        #4a3f35;
      --stone:       #8c7f72;
      --parchment:   #f7f3ee;
      --gold:        #b8935a;
      --gold-light:  #d4ab72;
      --ink:         #2c2820;
      --muted:       #6b6259;
    }

    /* ── Base ── */
    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.7;
    }

    a { color: var(--sage); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--bark); }

    h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif;
      color: var(--bark);
      line-height: 1.25;
    }

    h1 { font-size: 2.2rem; margin-bottom: 0.4rem; }
    h2 { font-size: 1.45rem; margin: 2rem 0 0.6rem; }
    h3 { font-size: 1.15rem; margin: 1.5rem 0 0.4rem; }

    p { margin-bottom: 1rem; }
    ul, ol { margin: 0.5rem 0 1rem 1.5rem; }
    li { margin-bottom: 0.3rem; }

    strong { color: var(--bark); font-weight: 600; }
    em { font-style: italic; }

    hr {
      border: none;
      border-top: 1px solid var(--sage-pale);
      margin: 2.5rem 0;
    }

    img { max-width: 100%; height: auto; }

    /* ── Layout ── */
    .site-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
    }

    /* ── Navigation ── */
    .site-header {
      background: var(--sage-mist);
      border-top: 3px solid var(--sage);
      border-bottom: 1px solid var(--sage-pale);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(6px);
    }

    .site-header .site-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--bark) !important;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .site-title:hover { color: var(--sage) !important; }

    .site-nav {
      display: flex;
      gap: 0;
      list-style: none;
    }

    .site-nav a {
      font-family: 'Lora', serif;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.4rem 0.85rem;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--sage);
      border-bottom-color: var(--sage);
    }

    /* Mobile nav toggle */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--bark);
      transition: all 0.3s;
    }

    /* ── Page Content ── */
    .page-content {
      flex: 1;
      padding: 3rem 0 4rem;
    }

    /* ── Footer ── */
    .site-footer {
      background: var(--sage-pale);
      border-top: 1px solid var(--sage-light);
      padding: 1.8rem 0;
      font-size: 0.8rem;
      color: var(--stone);
    }

    .site-footer .site-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .site-footer a { color: var(--stone); }
    .site-footer a:hover { color: var(--bark); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .site-header .site-wrapper { flex-wrap: wrap; height: auto; padding: 1rem 1.5rem; gap: 0.5rem; }
      .site-nav { flex-wrap: wrap; gap: 0; }
      .site-nav a { padding: 0.3rem 0.6rem; font-size: 0.78rem; }
      .site-wrapper { padding: 0 1.25rem; }
      h1 { font-size: 1.75rem; }
    }

    /* ── Page fade-in ── */
    .page-content { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <ul class="site-nav">
          {% for page in site.header_pages %}
            {% assign page_obj = site.pages | where: "path", page | first %}
            <li><a href="{{ page_obj.url | relative_url }}"
              {% if page_obj.url == page.url %} class="active"{% endif %}>
              {{ page_obj.title }}
            </a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="page-content">
    <div class="site-wrapper">
      {{ content }}
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="site-wrapper">
      <span>{{ site.title }} · {{ site.description }}</span>
      <span>© {{ 'now' | date: "%Y" }}</span>
    </div>
  </footer>

</body>
</html>
